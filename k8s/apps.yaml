# ====== MICROSERVIÇO DE ESTOQUE ======
apiVersion: apps/v1
kind: Deployment
metadata:
  name: estoque-service
spec:
  replicas: 2
  strategy:
    type: RollingUpdate # Deploy sem downtime
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: estoque-service
  template:
    metadata:
      labels:
        app: estoque-service
    spec:
      containers:
        - name: estoque-service
          # ALTERADO AQUI
          image: 1kaiquedev/estoque:latest
          ports:
            - containerPort: 8083
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8083
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8083
            initialDelaySeconds: 20
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: estoque-service
spec:
  ports:
    - port: 8083
  selector:
    app: estoque-service

